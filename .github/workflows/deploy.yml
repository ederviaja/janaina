name: Deploy com chaves

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Injetar SUPABASE_ANON_KEY
        run: |
          sed -i "s|COLOCA_AQUI_SUA_CHAVE_PUBLICA|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
